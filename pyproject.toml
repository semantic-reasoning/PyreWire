[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyrewire"
version = "0.1.0"
description = "Python wrapper for Wirelog - declarative dataflow analysis"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0 OR GPL-3.0-or-later"
license-files = ["LICENSE", "LICENSE-APACHE", "LICENSE-GPL"]
authors = [
    {name = "PyreWire Contributors"}
]
keywords = ["wirelog", "datalog", "dataflow", "analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering",
]

dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "isort>=5.0",
    "flake8>=6.0",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/justinjoy/pyrewire"
Repository = "https://github.com/justinjoy/pyrewire"
Documentation = "https://github.com/justinjoy/pyrewire#readme"
Issues = "https://github.com/justinjoy/pyrewire/issues"

[tool.setuptools]
packages = ["pyrewire"]
package-dir = {"" = "src"}

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
addopts = "--cov=pyrewire --cov-report=term-missing --cov-report=html"
