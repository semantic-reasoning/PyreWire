name: nightly

# Build wirelog from `main` (not the pinned release tag) and run
# PyreWire's full test suite against it. If the run fails, file or
# update a `nightly-failure` tracking issue so upstream breakage is
# visible within 24 hours.

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  test_against_main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install meson + ninja
        run: pip install meson ninja

      - name: build wirelog from main
        env:
          WIRELOG_VERSION: main
          WIRELOG_PREFIX: ${{ runner.temp }}/wirelog-install
        run: bash scripts/build_wirelog.sh

      - name: install pyrewire (dev)
        run: pip install -e ".[dev,numpy]"

      - name: pytest (no coverage gate)
        id: tests
        env:
          LD_LIBRARY_PATH: ${{ runner.temp }}/wirelog-install/lib
        run: pytest -q -o addopts="" tests/

      - name: file or update nightly-failure issue
        if: failure() && steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: bash scripts/ci/open_nightly_failure_issue.sh
