name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install lint deps
        # pytest is needed so mypy can find its stubs when type-checking tests/.
        # numpy is an optional runtime dependency (#22 zero-copy path) but
        # mypy still needs its types when type-checking src/pyrewire/session.py.
        run: pip install black isort flake8 mypy pytest numpy
      - name: black --check
        run: black --check .
      - name: isort --check
        run: isort --check-only .
      - name: flake8
        run: flake8 .
      - name: mypy (strict on src/pyrewire; tests excluded)
        run: mypy src/pyrewire

  test:
    needs: lint
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is the ARM (Apple Silicon) runner. Intel macos-13 is
        # often heavily queued; ARM has more capacity in the GitHub-hosted
        # pool and is also the architecture wheels target for new Macs.
        # windows-2022 covers the MSVC toolchain that wheels.yml already
        # exercises via cibuildwheel; this matrix entry catches MSVC
        # regressions on every PR instead of only at tag time.
        os: [ubuntu-22.04, macos-14, windows-2022]
        python: ["3.11", "3.12", "3.13"]
    env:
      # WIRELOG_VERSION here is the exact wirelog ref CI builds against.
      # The default is pinned to the wirelog v0.44.0 release commit;
      # override the repository variable to test another ref before
      # updating this fallback.
      WIRELOG_VERSION: ${{ vars.WIRELOG_VERSION || '5bebc8d40bbb850179fbb091807964762df5a814' }}
      # `runner.temp` is NOT available in job-level `env:` (only in
      # step-level contexts) — using it here caused the whole workflow
      # to fail at startup (#114). `github.workspace` IS resolvable at
      # job level and resolves to a stable per-job path on all three
      # runner OSes. Forward slashes work on Windows too — Win32 path
      # APIs accept them, and the bash pytest step reads this verbatim.
      WIRELOG_PREFIX: ${{ github.workspace }}/wirelog-install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Activate the MSVC 2022 environment (vcvars) so meson + ninja
      # pick `cl.exe` instead of any stray clang/MinGW gcc on PATH.
      - name: setup MSVC dev env
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Resolve WIRELOG_VERSION (a tag like `v0.44.0`, a branch ref
      # like `main`, or an exact commit SHA) to the underlying commit
      # SHA. The cache key uses the SHA — not the version label — so that:
      #   * a moving ref like `main` invalidates the cache each time
      #     upstream advances, and
      #   * a retagged release (same label, new commit) also
      #     invalidates correctly.
      # `git ls-remote URL <ref>` returns both the tag object and its
      # `^{}` peeled commit for annotated tags; `tail -1` picks the
      # peeled commit. For branches and lightweight tags it's the
      # only line.
      - name: resolve wirelog commit sha
        id: wirelog-sha
        shell: bash
        run: |
          if [[ "$WIRELOG_VERSION" =~ ^[0-9a-fA-F]{40}$ ]]; then
            sha="$WIRELOG_VERSION"
          else
            sha=$(git ls-remote https://github.com/semantic-reasoning/wirelog "$WIRELOG_VERSION" | tail -1 | awk '{print $1}')
          fi
          if [ -z "$sha" ]; then
            echo "could not resolve $WIRELOG_VERSION on github.com/semantic-reasoning/wirelog" >&2
            exit 1
          fi
          echo "Resolved $WIRELOG_VERSION -> $sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      # Cache the wirelog install prefix across runs. Key includes the
      # resolved commit SHA and the build-script hashes so a script
      # edit or a wirelog-side commit invalidates entries automatically.
      # The matrix.os axis keeps Linux / macOS / Windows caches separate
      # (binary incompatible). Python-version is NOT in the key because
      # the install is pure C; one cache entry serves every py3.11–3.13
      # matrix slot on the same OS.
      - name: cache wirelog install
        id: cache-wirelog
        uses: actions/cache@v4
        with:
          path: ${{ env.WIRELOG_PREFIX }}
          key: wirelog-${{ matrix.os }}-${{ steps.wirelog-sha.outputs.sha }}-${{ hashFiles('scripts/build_wirelog.sh', 'scripts/build_wirelog.ps1') }}

      - name: install meson + ninja
        if: steps.cache-wirelog.outputs.cache-hit != 'true'
        run: pip install meson ninja

      - name: build wirelog from source (POSIX)
        if: steps.cache-wirelog.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: bash scripts/build_wirelog.sh

      - name: build wirelog from source (Windows / MSVC)
        if: steps.cache-wirelog.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/build_wirelog.ps1

      - name: install pyrewire
        run: pip install -e ".[dev]"

      - name: pytest with coverage gate
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # The dylib symlink shipped by wirelog may be either form;
            # prefer the SONAME-1 variant and fall back to the
            # version-major variant.
            if [ -f "$WIRELOG_PREFIX/lib/libwirelog.1.dylib" ]; then
              export WIRELOG_LIB="$WIRELOG_PREFIX/lib/libwirelog.1.dylib"
            else
              export WIRELOG_LIB="$WIRELOG_PREFIX/lib/libwirelog.dylib"
            fi
            export DYLD_LIBRARY_PATH="$WIRELOG_PREFIX/lib:${DYLD_LIBRARY_PATH:-}"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            # Meson on Windows installs the DLL into bindir (bin/) and
            # the import library into libdir (lib/); the loader needs
            # the DLL at runtime, so point WIRELOG_LIB at it and put
            # its directory on PATH so dependent DLLs are also found.
            export WIRELOG_LIB="$WIRELOG_PREFIX/bin/wirelog-1.dll"
            export PATH="$WIRELOG_PREFIX/bin:$PATH"
          else
            export WIRELOG_LIB="$WIRELOG_PREFIX/lib/libwirelog.so.1"
            export LD_LIBRARY_PATH="$WIRELOG_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          fi
          pytest -q
