name: wheels

# Build PyreWire wheels for every supported (OS, Python) combination
# via cibuildwheel. Triggered on `v*` tags (release pipeline) and on
# manual dispatch (for verification before tagging).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 produces manylinux_2_28 via cibuildwheel docker.
        # macos-14 is the Apple Silicon (arm64) runner; cibuildwheel's
        # macos config builds for both arm64 and x86_64 from there.
        # windows-2022 covers MSVC + delvewheel.
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
