name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # PyPI trusted publishing (OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$ver" ]; then
            echo "ERROR: tag $tag does not match pyproject version $ver"
            exit 1
          fi
          echo "tag $tag matches pyproject version $ver"

      - name: download wheels artifact
        if: ${{ false }}
        # The wheel-build matrix (#30) uploads `wheels-*` artifacts.
        # Until that pipeline is wired into this workflow, the
        # release ships the sdist only. Flip the `if:` to `true`
        # once #30 / #31 land.
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: install build deps
        run: pip install build

      - name: build sdist
        run: python -m build --sdist --outdir dist

      - name: publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: CHANGELOG.md
